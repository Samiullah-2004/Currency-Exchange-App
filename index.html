<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
        integrity="sha512-DTOQO9RWCH3ppGqcWaEA1BIZOC6xxalwEsw9c2QQeAIftl+Vegovlnee1c9QX4TctnWMn13TZye+giMm8e2LwA=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
    <title>Currency Exchanger</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="container">

        <div class="name">
            <h2>Currency Exchanger</h2>
        </div>

        <div class="amount">
            <h5>Enter Amount</h5>
            <input type="text" placeholder="0.00">
        </div>

        <div class="exchanger">
            <div class="from">
                <img src="https://flagsapi.com/US/flat/64.png" alt="flag">
                <select id="options1"></select>
            </div>

            <div class="icon">
                <i class="fa-solid fa-arrow-right-arrow-left"></i>
            </div>

            <div class="to">
                <img src="https://flagsapi.com/PK/flat/64.png" alt="flag">
                <select id="options2"></select>
            </div>
        </div>

        <div class="value">Select currencies &amp; enter amount</div>

        <div class="btn">
            <button>Get Exchange Rate</button>
        </div>

    </div>


    <script src="script.js"></script>
</body>
</html>
